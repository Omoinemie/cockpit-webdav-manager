name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (留空则读取 VERSION 文件)'
        required: false
        default: ''
      create_release:
        description: '是否发布到 Release (Yes/No)'
        type: boolean
        required: true
        default: true

permissions:
  contents: write

jobs:
  # ── 阶段 1: 确定版本号 ──
  prepare:
    name: Determine Version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      ver: ${{ steps.resolve.outputs.ver }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: resolve
        run: |
          INPUT_VER="${{ github.event.inputs.version }}"

          # 尝试读取 VERSION 文件
          if [ -f VERSION ]; then
            FILE_VER=$(cat VERSION | tr -d '[:space:]')
          else
            FILE_VER=""
          fi

          if [ -n "$INPUT_VER" ]; then
            # 手动输入优先，校验格式
            VER="$INPUT_VER"
            if ! echo "$VER" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::版本号格式无效: $VER (需要 x.y.z)"
              exit 1
            fi
            echo "$VER" > VERSION
            echo "ver=${VER}" >> "$GITHUB_OUTPUT"
            echo "📌 使用手动版本: $VER (VERSION 文件已更新)"
          elif [ -n "$FILE_VER" ]; then
            VER="$FILE_VER"
            echo "ver=${VER}" >> "$GITHUB_OUTPUT"
            echo "📌 使用 VERSION 文件版本: $VER"
          else
            # 都没有，从 manifest.json 读取
            VER=$(python3 -c "import json; print(json.load(open('manifest.json'))['package_version'])")
            echo "ver=${VER}" >> "$GITHUB_OUTPUT"
            echo "📌 使用 manifest.json 版本: $VER"
          fi

      - name: Write version to VERSION file
        run: |
          echo "${{ steps.resolve.outputs.ver }}" > VERSION
          echo "✅ VERSION → ${{ steps.resolve.outputs.ver }}"

      - name: Commit version bump
        if: ${{ github.event.inputs.version != '' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git diff --staged --quiet && exit 0
          git commit -m "chore: bump version to ${{ steps.resolve.outputs.ver }}"
          git push

  # ── 阶段 2: 构建 .deb ──
  build:
    name: Build .deb
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build .deb package
        run: |
          # prepare 阶段推了新 commit，checkout 可能还是旧的，补写 VERSION
          echo "${{ needs.prepare.outputs.ver }}" > VERSION
          chmod +x build-deb.sh
          ./build-deb.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: cockpit-webdav-manager_*_all.deb

  # ── 阶段 3: 发布 Release ──
  release:
    name: Create Release
    needs: [prepare, build]
    if: ${{ github.event.inputs.create_release == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deb-package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.ver }}
          name: v${{ needs.prepare.outputs.ver }}
          body: |
            ## Cockpit WebDAV Manager v${{ needs.prepare.outputs.ver }}

            ### Install
            ```bash
            sudo dpkg -i cockpit-webdav-manager_${{ needs.prepare.outputs.ver }}_all.deb
            sudo systemctl restart cockpit
            ```
          files: cockpit-webdav-manager_*_all.deb
